# docker-compose.yml
services:
  chromadb:
    image: chromadb/chroma:1.5.5
    container_name: document-analyzer-chromadb
    ports:
      - "8100:8000"
    volumes:
      - chroma_data:/chroma/chroma
      - /Users/erdoanshaziman/ai-practice-docs:/documents:ro
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped

volumes:
  chroma_data:
