# docker-compose.yml
services:
  chromadb:
    image: chromadb/chroma:1.5.5
    container_name: document-analyzer-chromadb
    ports:
      - "8100:8000"
    volumes:
      - chroma_data:/chroma/chroma
      - /Users/erdoanshaziman/ai-practice-docs:/documents:ro
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped

  postgres:
    image: postgres:17
    container_name: document-analyzer-postgres
    environment:
      POSTGRES_USER: ed
      POSTGRES_PASSWORD: 123123
      POSTGRES_DB: document_analyzer
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  chroma_data:
  postgres_data:
